<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Compara dos países lado a lado: población, área, capital, idiomas y más.">
    <meta name="keywords" content="comparar países, geografía, estadísticas, población, área">
    <meta name="author" content="Explora el Mundo">
    <title data-translate="comparar.title">Comparar Países</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-white font-sans transition-colors duration-300">

    <nav class="bg-gray-900 dark:bg-indigo-950 border-b border-gray-800 dark:border-indigo-900 sticky top-0 z-50 transition-colors duration-300">
        <div class="container mx-auto px-6 flex justify-between items-center h-16">
            <a href="index.html" class="flex items-center gap-2 group">
                <i class="fas fa-globe text-blue-400 text-xl group-hover:rotate-12 transition-transform duration-300"></i>
                <span class="font-bold text-xl text-white tracking-tight">Explora</span>
            </a>
            <!-- Desktop -->
            <div class="hidden md:flex items-center gap-7">
                <a href="index.html" class="nav-link text-gray-300 hover:text-white font-medium text-sm transition-colors">Inicio</a>
                <a href="paises.html" class="nav-link text-gray-300 hover:text-white font-medium text-sm transition-colors" data-translate="nav.paises">Países</a>
                <a href="comparar.html" class="nav-link active text-white font-semibold text-sm" data-translate="nav.comparar">Comparar</a>
                <a href="mapa.html" class="nav-link text-gray-300 hover:text-white font-medium text-sm transition-colors" data-translate="nav.mapa">Mapa</a>
                <a href="juegos.html" class="bg-blue-600 hover:bg-blue-500 text-white text-sm font-semibold px-4 py-1.5 rounded-full transition-colors" data-translate="nav.quiz">Quiz</a>
                <div class="flex items-center gap-3 border-l border-gray-700 dark:border-indigo-800 pl-6">
                    <button id="theme-toggle" aria-label="Cambiar tema" class="w-8 h-8 rounded-full bg-gray-800 dark:bg-indigo-900 flex items-center justify-center text-gray-300 hover:text-white transition-colors">
                        <i class="fas fa-moon text-sm"></i>
                    </button>
                    <select id="language-switcher" class="bg-transparent text-gray-300 border-0 outline-none font-medium text-sm cursor-pointer">
                        <option value="es">ES</option>
                        <option value="en">EN</option>
                    </select>
                </div>
            </div>
            <!-- Mobile -->
            <div class="flex md:hidden items-center gap-3">
                <button id="theme-toggle" aria-label="Cambiar tema" class="w-8 h-8 rounded-full bg-gray-800 dark:bg-indigo-900 flex items-center justify-center text-gray-300">
                    <i class="fas fa-moon text-sm"></i>
                </button>
                <select id="language-switcher" class="bg-transparent text-gray-300 border-0 outline-none text-sm cursor-pointer">
                    <option value="es">ES</option>
                    <option value="en">EN</option>
                </select>
                <button id="menu-btn" class="w-8 h-8 rounded-full bg-gray-800 dark:bg-indigo-900 flex items-center justify-center text-gray-300" aria-label="Menú">
                    <i class="fas fa-bars text-sm"></i>
                </button>
            </div>
        </div>
        <!-- Mobile menu -->
        <div id="mobile-menu" class="hidden md:hidden border-t border-gray-800 dark:border-indigo-900 px-6 py-3 bg-gray-900 dark:bg-indigo-950">
            <a href="index.html" class="block py-2 text-gray-300 hover:text-white font-medium text-sm">Inicio</a>
            <a href="paises.html" class="block py-2 text-gray-300 hover:text-white font-medium text-sm" data-translate="nav.paises">Países</a>
            <a href="comparar.html" class="block py-2 text-white font-semibold text-sm" data-translate="nav.comparar">Comparar</a>
            <a href="mapa.html" class="block py-2 text-gray-300 hover:text-white font-medium text-sm" data-translate="nav.mapa">Mapa</a>
            <a href="juegos.html" class="block py-2 text-gray-300 hover:text-white font-medium text-sm" data-translate="nav.quiz">Quiz</a>
        </div>
    </nav>

    <!-- Hero header -->
    <header class="bg-gradient-to-br from-emerald-700 via-teal-700 to-cyan-700 text-white py-12 text-center">
        <i class="fas fa-scale-balanced text-5xl mb-3 block opacity-80"></i>
        <h1 class="text-4xl md:text-5xl font-extrabold mb-2" data-translate="comparar.title">Comparar Países</h1>
        <p class="text-lg text-teal-200" data-translate="comparar.subtitle">Elige dos países para ver sus diferencias.</p>
    </header>

    <main class="flex-1 container mx-auto px-4 py-8">
        <div class="max-w-3xl mx-auto">
            <!-- Buscadores -->
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-8">
                <div class="relative">
                    <i class="fas fa-flag absolute left-4 top-1/2 -translate-y-1/2 text-blue-500 pointer-events-none"></i>
                    <input type="text" id="search-1" list="datalist-1" placeholder="País 1..." class="w-full pl-11 pr-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500 dark:text-white text-sm">
                    <datalist id="datalist-1"></datalist>
                </div>
                <div class="relative">
                    <i class="fas fa-flag absolute left-4 top-1/2 -translate-y-1/2 text-emerald-500 pointer-events-none"></i>
                    <input type="text" id="search-2" list="datalist-2" placeholder="País 2..." class="w-full pl-11 pr-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-emerald-500 dark:text-white text-sm">
                    <datalist id="datalist-2"></datalist>
                </div>
            </div>
            <!-- Placeholder -->
            <div id="comparison-placeholder" class="text-center py-20 text-gray-400">
                <i class="fas fa-scale-balanced text-6xl mb-4 block opacity-30"></i>
                <p class="text-lg font-medium" data-translate="comparar.placeholder">Selecciona dos países para comparar</p>
            </div>
            <!-- Resultado -->
            <div id="comparison-result"></div>
        </div>
    </main>

    <footer class="bg-gray-900 dark:bg-indigo-950 border-t border-gray-800 dark:border-indigo-900 text-white py-8 transition-colors duration-300">
        <div class="container mx-auto px-6 text-center">
            <div class="flex items-center justify-center gap-2 mb-2">
                <i class="fas fa-globe text-blue-400 text-lg"></i>
                <span class="font-bold text-lg">Explora el Mundo</span>
            </div>
            <p class="text-gray-400 text-sm mb-4" data-translate="footer.rights">&copy; 2025 Explora el Mundo. Todos los derechos reservados.</p>
            <div class="flex justify-center gap-4">
                <a href="#" class="text-gray-400 hover:text-white transition-colors text-lg"><i class="fab fa-twitter"></i></a>
                <a href="#" class="text-gray-400 hover:text-white transition-colors text-lg"><i class="fab fa-facebook"></i></a>
                <a href="#" class="text-gray-400 hover:text-white transition-colors text-lg"><i class="fab fa-instagram"></i></a>
            </div>
        </div>
    </footer>

    <script src="js/theme-toggle.js"></script>
    <script src="js/language.js"></script>
    <script src="js/ui/navbar.js"></script>
    <script src="js/api/countries.js"></script>
    <script src="js/pages/comparar.js"></script>

</body>

</html>
