<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Lista de todos los países del mundo, sus capitales y banderas.">
    <meta name="keywords" content="lista de países, capitales, banderas, geografía">
    <meta name="author" content="Explora el Mundo">
    <title data-translate="paises.title">Países del Mundo</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-white font-sans transition-colors duration-300">

    <nav class="bg-gray-900 dark:bg-indigo-950 border-b border-gray-800 dark:border-indigo-900 sticky top-0 z-50 transition-colors duration-300">
        <div class="container mx-auto px-6 flex justify-between items-center h-16">
            <a href="index.html" class="flex items-center gap-2 group">
                <i class="fas fa-globe text-blue-400 text-xl group-hover:rotate-12 transition-transform duration-300"></i>
                <span class="font-bold text-xl text-white tracking-tight">Explora</span>
            </a>
            <!-- Desktop -->
            <div class="hidden md:flex items-center gap-7">
                <a href="index.html" class="nav-link text-gray-300 hover:text-white font-medium text-sm transition-colors">Inicio</a>
                <a href="paises.html" class="nav-link active text-white font-semibold text-sm" data-translate="nav.paises">Países</a>
                <a href="juegos.html" class="bg-blue-600 hover:bg-blue-500 text-white text-sm font-semibold px-4 py-1.5 rounded-full transition-colors" data-translate="nav.quiz">Quiz</a>
                <div class="flex items-center gap-3 border-l border-gray-700 dark:border-indigo-800 pl-6">
                    <button id="theme-toggle" aria-label="Cambiar tema" class="w-8 h-8 rounded-full bg-gray-800 dark:bg-indigo-900 flex items-center justify-center text-gray-300 hover:text-white transition-colors">
                        <i class="fas fa-moon text-sm"></i>
                    </button>
                    <select id="language-switcher" class="bg-transparent text-gray-300 border-0 outline-none font-medium text-sm cursor-pointer">
                        <option value="es">ES</option>
                        <option value="en">EN</option>
                    </select>
                </div>
            </div>
            <!-- Mobile -->
            <div class="flex md:hidden items-center gap-3">
                <button id="theme-toggle" aria-label="Cambiar tema" class="w-8 h-8 rounded-full bg-gray-800 dark:bg-indigo-900 flex items-center justify-center text-gray-300">
                    <i class="fas fa-moon text-sm"></i>
                </button>
                <select id="language-switcher" class="bg-transparent text-gray-300 border-0 outline-none text-sm cursor-pointer">
                    <option value="es">ES</option>
                    <option value="en">EN</option>
                </select>
                <button id="menu-btn" class="w-8 h-8 rounded-full bg-gray-800 dark:bg-indigo-900 flex items-center justify-center text-gray-300" aria-label="Menú">
                    <i class="fas fa-bars text-sm"></i>
                </button>
            </div>
        </div>
        <!-- Mobile menu -->
        <div id="mobile-menu" class="hidden md:hidden border-t border-gray-800 dark:border-indigo-900 px-6 py-3 bg-gray-900 dark:bg-indigo-950">
            <a href="index.html" class="block py-2 text-gray-300 hover:text-white font-medium text-sm">Inicio</a>
            <a href="paises.html" class="block py-2 text-white font-semibold text-sm" data-translate="nav.paises">Países</a>
            <a href="juegos.html" class="block py-2 text-gray-300 hover:text-white font-medium text-sm" data-translate="nav.quiz">Quiz</a>
        </div>
    </nav>

    <!-- Hero header -->
    <header class="bg-gradient-to-br from-blue-700 via-indigo-700 to-indigo-900 text-white py-14">
        <div class="container mx-auto px-4 text-center">
            <h1 class="text-4xl md:text-5xl font-extrabold mb-2" data-translate="paises.title">Países del Mundo</h1>
            <p class="text-lg text-blue-200" data-translate="paises.subtitle">Busca y explora información detallada de cada país.</p>
        </div>
    </header>

    <!-- Barra de búsqueda sticky -->
    <div class="sticky top-16 z-40 bg-white/95 dark:bg-gray-900/95 backdrop-blur border-b border-gray-200 dark:border-gray-700 shadow-sm py-4">
        <div class="container mx-auto px-4">
            <div class="flex items-center gap-3">
                <div class="relative flex-1">
                    <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none text-sm"></i>
                    <input type="text" id="searchInput"
                        class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500 dark:text-white transition-colors text-sm">
                </div>
                <span class="text-sm text-gray-500 dark:text-gray-400 whitespace-nowrap font-medium">
                    <span id="results-count" class="font-bold text-blue-600 dark:text-blue-400">0</span>
                    <span data-translate="paises.results_label"> países</span>
                </span>
            </div>
            <!-- Pills de región -->
            <div id="regionPills" class="flex flex-wrap gap-2 mt-3"></div>
        </div>
    </div>

    <main class="container mx-auto px-4 py-8 flex-1">
        <section id="paises-container" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4">
        </section>
    </main>

    <div id="countryModal"
        class="fixed inset-0 bg-gray-900/80 backdrop-blur-sm flex items-center justify-center p-4 z-50 hidden">
        <div
            class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl max-w-3xl w-full relative max-h-[88vh] flex flex-col">
            <button id="closeModalBtn"
                class="absolute top-4 right-4 z-10 w-9 h-9 flex items-center justify-center rounded-full bg-gray-100 dark:bg-gray-700 text-gray-500 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-gray-600 hover:text-gray-900 dark:hover:text-white transition-colors text-sm">
                <i class="fas fa-times"></i>
            </button>
            <div id="modalContent" class="overflow-y-auto flex-1 min-h-0">
            </div>
        </div>
    </div>

    <footer class="bg-gray-900 dark:bg-indigo-950 border-t border-gray-800 dark:border-indigo-900 text-white py-8 transition-colors duration-300">
        <div class="container mx-auto px-6 text-center">
            <div class="flex items-center justify-center gap-2 mb-2">
                <i class="fas fa-globe text-blue-400 text-lg"></i>
                <span class="font-bold text-lg">Explora el Mundo</span>
            </div>
            <p class="text-gray-400 text-sm mb-4" data-translate="footer.rights">&copy; 2025 Explora el Mundo. Todos los derechos reservados.</p>
            <div class="flex justify-center gap-4">
                <a href="#" class="text-gray-400 hover:text-white transition-colors text-lg"><i class="fab fa-twitter"></i></a>
                <a href="#" class="text-gray-400 hover:text-white transition-colors text-lg"><i class="fab fa-facebook"></i></a>
                <a href="#" class="text-gray-400 hover:text-white transition-colors text-lg"><i class="fab fa-instagram"></i></a>
            </div>
        </div>
    </footer>

    <script src="js/theme-toggle.js"></script>
    <script src="js/language.js"></script>
    <script src="js/ui/navbar.js"></script>
    <script src="js/api/countries.js"></script>
    <script src="js/pages/paises.js"></script>

</body>

</html>
