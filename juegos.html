<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Juega al quiz de banderas para poner a prueba tus conocimientos de geografía.">
    <meta name="keywords" content="quiz, banderas, juego, geografía, países, educación">
    <meta name="author" content="Explora el Mundo">
    <title data-translate="nav.quiz">Quiz de Banderas</title>

    <!-- Open Graph / Social Sharing -->
    <meta property="og:title" content="Quiz de Banderas - Explora el Mundo">
    <meta property="og:description" content="Pon a prueba tus conocimientos de geografía con este divertido quiz.">
    <meta property="og:image" content="https://via.placeholder.com/600x400?text=Quiz+Banderas">
    <meta property="og:url" content="https://tusitio.com/juegos.html">
    <meta property="og:type" content="website">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Quiz de Banderas">
    <meta name="twitter:description" content="Pon a prueba tus conocimientos de geografía con este divertido quiz.">
    <meta name="twitter:image" content="https://via.placeholder.com/600x400?text=Quiz+Banderas">

    <!-- TailwindCSS & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="https://via.placeholder.com/32?text=🌍">
</head>

<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-white font-sans transition-colors duration-300">

    <!-- Navbar -->
    <nav class="bg-white dark:bg-gray-800 shadow-md py-4 sticky top-0 z-50">
        <div class="container mx-auto px-4 flex justify-between items-center">
            <div class="text-2xl font-bold">🌍 Explora</div>
            <div class="flex items-center gap-4">
                <a href="index.html" class="text-gray-700 dark:text-gray-200 hover:text-blue-600">Inicio</a>
                <a href="paises.html" class="text-gray-700 dark:text-gray-200 hover:text-blue-600" data-translate="nav.paises">Países</a>
                <a href="juegos.html" class="text-gray-700 dark:text-gray-200 hover:text-blue-600" data-translate="nav.quiz">Quiz</a>
                <button id="theme-toggle" aria-label="Cambiar tema" class="text-gray-700 dark:text-gray-200">
                    <i class="fas fa-moon"></i>
                </button>
                <select id="language-switcher" class="bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-200 border-0 outline-none">
                    <option value="es">ES</option>
                    <option value="en">EN</option>
                </select>
            </div>
        </div>
    </nav>

    <!-- Main -->
    <main class="container mx-auto px-4 py-16 relative">

        <!-- Pantalla completa -->
        <button onclick="document.documentElement.requestFullscreen()" aria-label="Pantalla completa" class="absolute top-4 right-4 bg-gray-200 dark:bg-gray-700 px-3 py-1 rounded-full shadow hover:scale-105 transition-transform">⛶</button>

        <!-- Header -->
        <header class="text-center mb-12">
            <h1 class="text-4xl md:text-5xl font-extrabold mb-2" data-translate="quiz.title">Quiz</h1>
            <p class="text-lg text-gray-600 dark:text-gray-400" data-translate="quiz.subtitle">Pon a prueba tus conocimientos de geografía.</p>
        </header>

        <!-- Game Section -->
        <section class="bg-white dark:bg-gray-800 p-8 rounded-lg shadow-xl max-w-2xl mx-auto">

            <!-- Selección de modo -->
            <div class="text-center mb-6">
                <h2 class="text-xl font-bold mb-4" data-translate="quiz.select_mode">Selecciona un modo de juego:</h2>
                <div class="flex justify-center gap-4">
                    <button id="mode-flags-btn" class="px-6 py-2 rounded-full border-2 font-semibold transition-transform transform hover:scale-105 bg-blue-600 text-white border-blue-600" data-translate="quiz.mode_flags">Banderas</button>
                    <button id="mode-capitals-btn" class="px-6 py-2 rounded-full border-2 font-semibold transition-transform transform hover:scale-105 border-gray-400 text-gray-700 dark:text-gray-200 dark:border-gray-600" data-translate="quiz.mode_capitals">Capitales</button>
                </div>
            </div>

            <!-- Progreso -->
            <div id="progress-container" class="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-2 mb-4 hidden">
                <div id="progress-bar" class="bg-blue-600 h-2 rounded-full" style="width: 0%;"></div>
            </div>

            <!-- Quiz -->
            <div id="quiz-container" class="hidden">
                <div class="text-center mb-6">
                    <h2 id="question-text" class="text-2xl font-bold mb-4"></h2>
                    <img id="flag-image" src="" alt="Bandera del país" class="w-full max-w-sm mx-auto border-2 border-gray-300 dark:border-gray-600 rounded-lg shadow-md hidden">
                </div>

                <div id="options-container" class="grid grid-cols-1 sm:grid-cols-2 gap-4 my-6"></div>

                <p id="feedback" role="alert" aria-live="polite" class="text-center text-lg font-semibold my-4"></p>
                <button id="next-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition-colors duration-300 hidden" data-translate="quiz.next_btn">Siguiente Pregunta</button>
            </div>

            <!-- Resultados -->
            <div id="results-container" class="text-center hidden">
                <h2 class="text-3xl font-bold mb-4" data-translate="quiz.results_title">Quiz Terminado</h2>
                <p id="score-text" aria-live="polite" class="text-2xl font-semibold mb-6">
                    <span data-translate="quiz.score">Tu puntuación:</span> <span id="score-value">0</span> / <span id="total-questions">10</span>
                </p>
                <button id="restart-btn" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-4 rounded-lg transition-colors duration-300" data-translate="quiz.restart_btn">Jugar de nuevo</button>
            </div>

            <!-- Loader -->
            <div id="loading-message" class="flex flex-col items-center justify-center mt-4 text-gray-500 dark:text-gray-400">
                <svg class="animate-spin h-6 w-6 mb-2 text-blue-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
                </svg>
                <span data-translate="quiz.loading">Cargando juego...</span>
            </div>

        </section>
    </main>

    <!-- Footer -->
    <footer class="bg-gray-800 dark:bg-gray-900 text-white py-8">
        <div class="container mx-auto px-4 text-center">
            <p class="mb-4" data-translate="footer.rights">&copy; 2025 Explora el Mundo. Todos los derechos reservados.</p>
            <div class="flex justify-center gap-4">
                <a href="#" class="text-gray-400 hover:text-white"><i class="fab fa-twitter"></i></a>
                <a href="#" class="text-gray-400 hover:text-white"><i class="fab fa-facebook"></i></a>
                <a href="#" class="text-gray-400 hover:text-white"><i class="fab fa-instagram"></i></a>
            </div>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="js/theme-toggle.js"></script>
    <script src="js/language.js"></script>
    <script src="js/juegos.js"></script>

</body>
</html>
